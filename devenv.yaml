# Nix inputs (flake sources)
inputs:
  devenv:
    url: github:cachix/devenv/v2.1.2?dir=src/modules
  nixpkgs:
    url: github:NixOS/nixpkgs/nixpkgs-unstable
  stax-src:
    url: github:geoHeil/stax/90372b44939831911de551dc30cd9610854b3fef
    flake: false
  # Provides Python versions dropped from nixpkgs-unstable.
  nixpkgs-python:
    url: github:cachix/nixpkgs-python
    inputs:
      nixpkgs:
        follows: nixpkgs
