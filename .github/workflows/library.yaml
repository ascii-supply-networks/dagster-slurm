name: build, test, release

on:
  push:
    branches: [main]
    paths:
      - ".github/actions/setup-devenv/**"
      - ".github/workflows/library.yaml"
      - "devenv.*"
      - "docker-compose*.yml"
      - "examples/**"
      - "justfile"
      - "nix/**"
      - "pixi.lock"
      - "pyproject.toml"
      - "projects/**"
      - "services/slurm/**"
      - "uv.lock"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/actions/setup-devenv/**"
      - ".github/workflows/library.yaml"
      - "devenv.*"
      - "docker-compose*.yml"
      - "examples/**"
      - "justfile"
      - "nix/**"
      - "pixi.lock"
      - "pyproject.toml"
      - "projects/**"
      - "services/slurm/**"
      - "uv.lock"
  workflow_dispatch:

concurrency:
  group: library-main-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/slurm-docker-cluster
  SLURM_VERSION: 25-11-2-1

jobs:
  changes:
    name: Detect expensive CI changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run-expensive: ${{ steps.detect.outputs.run-expensive }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "run-expensive=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" > changed-files.txt

          cat changed-files.txt

          if grep -Eq '^(\.github/actions/setup-devenv/|\.github/workflows/library\.yaml|devenv\.(nix|yaml|lock)|docker-compose(\.ci)?\.yml|examples/|nix/|pixi\.lock|pyproject\.toml|projects/|services/slurm/|uv\.lock)' changed-files.txt; then
            echo "run-expensive=true" >> "$GITHUB_OUTPUT"
          else
            echo "run-expensive=false" >> "$GITHUB_OUTPUT"
          fi

  validate-pr:
    name: Validate PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            ci
            build
          requireScope: false
          disallowScopes: |
            release
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            doesn't start with an uppercase character.
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      DEVENV_PYTHON_VERSION: ${{ matrix.python-version }}
      PIXI_ENVIRONMENT_NAME: build
      PIXI_PROJECT_ROOT: ${{ github.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup CI tools
        uses: ./.github/actions/setup-devenv

      - name: Install managed Python
        run: uv python install --managed-python "$DEVENV_PYTHON_VERSION"

      - name: Sync uv workspace
        run: uv sync --frozen --managed-python --all-packages --all-groups --python "$DEVENV_PYTHON_VERSION"

      - name: Run unit tests without real SLURM
        run: uv run --frozen --no-sync --managed-python --python "$DEVENV_PYTHON_VERSION" pytest -m 'not (needs_slurm_docker or slow)' projects

  validation:
    name: Validate library
    runs-on: ubuntu-latest
    needs: changes
    # runs-on: paid-ci-runner-more-disk
    permissions:
      contents: read
      pull-requests: read
      packages: read
    env:
      DEVENV_PYTHON_VERSION: "3.10"
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup CI tools
        uses: ./.github/actions/setup-devenv

      - run: pixi install -e build --frozen

      - run: pixi run -e build --frozen lint

      - name: Run unit tests without real SLURM
        run: pixi run -e build --frozen testpixi

      - name: Log into registry ${{ env.REGISTRY }}
        if: needs.changes.outputs.run-expensive == 'true'
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start SLURM Cluster using pre-built image
        if: needs.changes.outputs.run-expensive == 'true'
        env:
          IMAGE_TAG: ${{ env.SLURM_VERSION }}
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.ci.yml \
            up -d --wait --wait-timeout 120 || {
              echo "⚠️ Docker compose wait timed out or failed"
            }

          # Now, add a real check to fail the job if the container isn't healthy
          if ! docker ps | grep slurmctld | grep -q '(healthy)'; then
            echo "❌ slurmctld did not become healthy."
            docker logs slurmctld
            exit 1
          fi

      - name: Install SSH client on runner
        if: needs.changes.outputs.run-expensive == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client sshpass netcat-openbsd

      - name: 🕵️‍♀️ Check Runner Environment
        if: needs.changes.outputs.run-expensive == 'true'
        run: |
          echo "### Runner OS Information"
          cat /etc/os-release
          echo
          echo "### OpenSSH Client Version"
          ssh -V
          echo
          echo "### OpenSSH Client Configuration"
          ssh -G localhost | grep -E '^(kexalgorithms|hostkeyalgorithms)'

      - name: Comprehensive SSH Verification (Runner -> Container)
        if: needs.changes.outputs.run-expensive == 'true'
        env:
          # Define credentials as ENV vars for clarity and reuse
          SSH_USER: submitter
          SSH_PASS: submitter
          SSH_HOST: localhost
          SSH_PORT: 2223
        run: |
          set -x # Print each command

          echo "---"
          echo "### STEP 1: Pre-flight Checks (Verifying Container State)"
          echo "---"

          echo "--> Effective sshd config (checking auth-related directives):"
          docker exec slurmctld sshd -T | egrep '^(passwordauthentication|pubkeyauthentication|usepam|permit.*login|allowusers|denyusers|allowgroups|denygroups|permitemptypasswords)' | sed 's/^/    /'

          echo "--> 'submitter' user status:"
          docker exec slurmctld id $SSH_USER
          docker exec slurmctld passwd -S $SSH_USER

          echo "--> 'submitter' user shell validity:"
          docker exec slurmctld getent passwd $SSH_USER
          docker exec slurmctld grep "$(getent passwd $SSH_USER | cut -d: -f7)" /etc/shells || echo "WARNING: User's shell may not be in /etc/shells"

          echo "--> Network listener INSIDE container:"
          docker exec slurmctld ss -ltn | grep ':22 '

          echo
          echo "---"
          echo "### STEP 2: Network Connectivity (Verifying Host State)"
          echo "---"
          echo "--> Basic TCP connection test:"
          nc -zv $SSH_HOST $SSH_PORT

          echo
          echo "---"
          echo "### STEP 3: Full SSH Connection Test (The Final Boss)"
          echo "---"
          # This is the most robust command.
          # -o PreferredAuthentications=password and -o PubkeyAuthentication=no force it to use only the method we care about.
          # -vvv provides maximum client-side debug information.
          if ! sshpass -p "$SSH_PASS" ssh -vvv \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o KexAlgorithms=+diffie-hellman-group14-sha256 \
            -o HostKeyAlgorithms=+ssh-rsa,rsa-sha2-256 \
            -p "$SSH_PORT" "${SSH_USER}@${SSH_HOST}" 'echo "✅ SSH connection successful"' 2> ssh_debug_output.log; then

            echo "======================================================================="
            echo "❌ ERROR: SSH connection failed. This is likely due to a crypto mismatch or auth issue."
            echo "======================================================================="
            echo
            echo "### Client-side SSH debug output (-vvv):"
            echo "This log shows what the client sees. Look for 'no matching host key type found' or similar errors."
            cat ssh_debug_output.log
            echo
            echo "### Server-side Authentication Log (MOST IMPORTANT LOG):"
            echo "This log shows why the server REJECTED the login. This is where the root cause is usually found."
            docker logs slurmctld | grep 'sshd'
            exit 1
          fi

          echo "✅ All SSH checks passed successfully."

      - name: debugging deploy
        if: needs.changes.outputs.run-expensive == 'true'
        env:
          SLURM_EDGE_NODE_HOST: localhost
          SLURM_EDGE_NODE_PORT: 2223
          SLURM_EDGE_NODE_USER: submitter
          SLURM_EDGE_NODE_PASSWORD: submitter
          SLURM_DEPLOYMENT_BASE_PATH: /home/submitter/pipelines/deployments
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          if ! bash -lc 'cd examples && pixi run deploy-prod-docker'; then
            echo "Deploy failed; dumping pack debug output..."
            bash -lc 'cd examples && pixi run -e opstooling --frozen python scripts/pack_environment.py --env packaged-cluster --platform auto --build-missing --debug' || true
            echo "Listing examples/ and dist/ for context..."
            ls -la examples
            ls -la examples/dist || true
            ls -la examples/projects || true
            ls -la examples/projects/*/dist || true
            ls -la examples/projects/*/dist/*.conda || true
            ls -la dist || true
            exit 1
          fi

      - name: Run integration tests against SLURM cluster
        if: needs.changes.outputs.run-expensive == 'true'
        env:
          SLURM_EDGE_NODE_HOST: localhost
          SLURM_EDGE_NODE_PORT: 2223
          SLURM_EDGE_NODE_USER: submitter
          SLURM_EDGE_NODE_PASSWORD: submitter
          SLURM_DEPLOYMENT_BASE_PATH: /home/submitter/pipelines/deployments
          # Randomize Ray ports in CI to prevent conflicts with default port 6379.
          # Uses RAY_PORT_SEED instead of SLURM_JOB_ID to avoid side effects
          # (IP resolution, temp dirs, multi-node detection) that break local-mode tests.
          # Incorporates run_attempt so re-runs get different ports.
          RAY_PORT_SEED: ${{ github.run_id }}${{ github.run_attempt }}
        run: pixi run -e build --frozen testpixi-integration

      - name: Stop SLURM Cluster and Clean Up
        if: always() && needs.changes.outputs.run-expensive == 'true'
        run: |
          echo "Tearing down SLURM cluster..."
          docker compose logs
          docker compose down -v

      - run: pixi run -e build --frozen build-lib

  release-dry-run:
    name: Semantic release dry run
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup CI tools
        uses: ./.github/actions/setup-devenv

      - name: Check semantic-release config
        run: |
          set +e
          output="$(pixi run -e build --frozen uv run semantic-release -v --noop version 2>&1)"
          status="$?"
          printf '%s\n' "$output"

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if printf '%s\n' "$output" | grep -q "Detached HEAD state cannot match any release groups; no release will be made"; then
            exit 0
          fi

          exit "$status"

  prerelease:
    name: Create pre-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      issues: read
      id-token: write
    needs: [unit-tests, validation]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'Automatically generated by python-semantic-release')
    environment: pre-release
    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: tibdex/github-app-token@v2.1.0
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup CI tools
        uses: ./.github/actions/setup-devenv

      - run: pixi run -e build --frozen sync

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          set -e

          # Create pre-release version
          pixi run -e build --frozen uv run semantic-release version --prerelease

          if ! git diff --staged --quiet; then
            git commit -m "chore: additional changes [skip ci]"
          fi

          # Push changes and tags
          git push origin main
          git push --tags

          # Create GitHub pre-release
          pixi run -e build --frozen uv run semantic-release publish

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: prerelease-python-package-distributions
          path: projects/dist/*
          if-no-files-found: error

      - name: Publish pre-release to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: projects/dist
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          verbose: true

  release:
    name: Promote prerelease to full release
    runs-on: ubuntu-latest
    needs: [unit-tests, validation]
    permissions:
      contents: write # Push commits, tags, and create releases
      pull-requests: read # Read PR information for changelog generation
      issues: read # Read issues for linking in releases
      id-token: write
    if: github.event_name == 'workflow_dispatch'
    environment: release
    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: tibdex/github-app-token@v2.1.0
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Validate and promote prerelease
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          set -e

          # Get current version from pyproject.toml
          CURRENT_VERSION=$(grep "version =" pyproject.toml | head -1 | cut -d'"' -f2)
          echo "📋 Current version: $CURRENT_VERSION"

          # Check if current version is a prerelease
          if echo "$CURRENT_VERSION" | grep -E "(rc|alpha|beta)" >/dev/null; then
            PRERELEASE_TAG="v$CURRENT_VERSION"
            echo "🔍 Looking for prerelease tag: $PRERELEASE_TAG"

            # Check if the prerelease exists and is marked as prerelease
            if gh release view "$PRERELEASE_TAG" >/dev/null 2>&1; then
              IS_PRERELEASE=$(gh release view "$PRERELEASE_TAG" --json isPrerelease --jq '.isPrerelease')
              if [ "$IS_PRERELEASE" = "true" ]; then
                echo "✅ Found valid prerelease: $PRERELEASE_TAG"
                echo "🚀 Promoting to full release..."
              else
                echo "❌ Release $PRERELEASE_TAG exists but is not marked as prerelease"
                exit 1
              fi
            else
              echo "❌ Prerelease $PRERELEASE_TAG not found"
              echo "💡 Push changes to main branch to create a prerelease first"
              exit 1
            fi
          else
            echo "❌ Current version ($CURRENT_VERSION) is not a prerelease"
            echo "💡 Push changes to main to create a prerelease first"
            exit 1
          fi

      - name: Setup CI tools
        uses: ./.github/actions/setup-devenv

      - run: pixi run -e build --frozen sync

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Create release
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          set -e

          pixi run -e build --frozen uv run semantic-release version

          if ! git diff --staged --quiet; then
            git commit -m "chore: additional changes [skip ci]"
          fi

          git push origin main
          git push --tags
          pixi run -e build --frozen uv run semantic-release publish

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-python-package-distributions
          path: projects/dist/*
          if-no-files-found: error

      - name: Publish to PyPI (Trusted Publishing)
        if: github.event.inputs.release_type != 'prerelease'
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: projects/dist
          skip-existing: true
          verbose: true
