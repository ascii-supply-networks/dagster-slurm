name: slides and pdf render

on:
  push:
    branches: [main]
    paths:
      - "slides/**"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "slides/**"
  workflow_dispatch:

concurrency:
  group: slides-main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build slides and render PDF
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.67.0
          cache: true
          frozen: true
      # - run: pixi run -e docs --frozen slides-build
      - run: pixi run -e docs --frozen slides-export-pdf
      - run: pixi run -e docs --frozen slides-export-pdf-multimodal
      - run: pixi run -e docs --frozen slides-export-pdf-scipy2026

      - name: Upload hackathon PDF
        uses: actions/upload-artifact@v7
        with:
          name: slides-hackathon
          path: slides/slides-export.pdf
          retention-days: 5

      - name: Upload multimodal PDF
        uses: actions/upload-artifact@v7
        with:
          name: slides-multimodal
          path: slides/slides_multimodal-export.pdf
          retention-days: 5

      - name: Upload SciPy 2026 PDF
        uses: actions/upload-artifact@v7
        with:
          name: slides-scipy2026
          path: slides/slides_scipy2026-export.pdf
          retention-days: 5
